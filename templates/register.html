<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Visualizer — Register</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 2rem;
      text-align: center;
    }
    .auth-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.4rem; }
    .auth-sub   { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .form-group input {
        width: 100%;
        padding: 10px 14px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        border-radius: var(--radius);
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition: all 0.2s;
    }
    .form-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(124,111,224,0.15);
    }
    .form-group input::placeholder { color: var(--muted2); }
    .auth-btn {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: var(--accent2); }
    .auth-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 1.5rem;
    }
    .auth-link a { color: var(--accent); text-decoration: none; }
    .auth-link a:hover { text-decoration: underline; }
    .auth-error {
      background: rgba(232,93,58,0.1);
      border: 1px solid rgba(232,93,58,0.3);
      color: var(--coral);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 1rem;
    }
    .theme-btn {
      position: fixed; top: 1rem; right: 1rem;
      width: 36px; height: 36px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

  <button class="theme-btn" onclick="toggleTheme()">
    <i class="ti ti-sun" id="theme-icon"></i>
  </button>

  <div class="auth-wrap">
    <div class="auth-card">

      <div class="auth-logo">&lt;dsa.visualizer /&gt;</div>

      <p class="auth-title">Create account</p>
      <p class="auth-sub">Start visualizing and tracking your DSA practice.</p>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="auth-btn">Create account</button>
      </form>

      <p class="auth-link">
        Already have an account? <a href="/login">Sign in</a>
      </p>

    </div>
  </div>

  <link rel="stylesheet" href="{{ url_for('static', filename='fonts/tabler-icons.min.css') }}">
</body>
</html>
